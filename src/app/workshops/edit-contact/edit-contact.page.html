<app-workshop-nav />

<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button menu="component-menu" aria-label="Open components">
          <ion-icon name="menu" />
        </ion-menu-button>
      </ion-buttons>
      <ion-title>Edit contact</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <main class="edit-contact-shell">
      <form class="edit-contact-form" (ngSubmit)="contactStore.save()">
        <section class="form-field" aria-labelledby="tags-label">
          <ion-label id="tags-label">Associated tags</ion-label>
          <app-tag-list />
        </section>

        <ion-item>
          <ion-input
            label="First name"
            labelPlacement="stacked"
            autocomplete="given-name"
            [ngModel]="contactStore.firstName()"
            name="firstName"
            (ngModelChange)="contactStore.setFirstName($event)"
          />
        </ion-item>

        <ion-item>
          <ion-input
            label="Last name"
            labelPlacement="stacked"
            autocomplete="family-name"
            [ngModel]="contactStore.lastName()"
            name="lastName"
            (ngModelChange)="contactStore.setLastName($event)"
          />
        </ion-item>

        <section class="form-field" aria-labelledby="phone-numbers-label">
          <ion-label id="phone-numbers-label">Phone numbers</ion-label>

          <div class="phone-list">
            @for (phoneNumber of contactStore.phoneNumbers(); track phoneNumber.id; let index = $index) {
              <div class="phone-row">
                <ion-item>
                  <ion-input
                    [label]="'Phone ' + (index + 1)"
                    labelPlacement="stacked"
                    inputmode="tel"
                    autocomplete="tel"
                    [ngModel]="phoneNumber.value"
                    [name]="phoneNumber.id"
                    (ngModelChange)="contactStore.updatePhoneNumber(phoneNumber.id, $event)"
                  />
                </ion-item>
                <ion-button
                  fill="clear"
                  shape="round"
                  color="medium"
                  [attr.aria-label]="'Remove phone ' + (index + 1)"
                  (click)="contactStore.removePhoneNumber(phoneNumber.id)"
                >
                  <ion-icon name="close" />
                </ion-button>
              </div>
            } @empty {
              <ion-text color="medium">No phone numbers</ion-text>
            }
          </div>

          <ion-button class="add-number-button" fill="outline" expand="block" aria-label="Add phone number" (click)="contactStore.addPhoneNumber()">
            <ion-icon name="add" slot="start" />
            add number
          </ion-button>
        </section>

        <ion-item>
          <ion-textarea
            label="Notes"
            labelPlacement="stacked"
            autoGrow="true"
            rows="5"
            [ngModel]="contactStore.notes()"
            name="notes"
            (ngModelChange)="contactStore.setNotes($event)"
          />
        </ion-item>

        @if (!contactStore.canSave()) {
          <ion-note color="danger">First or last name is required.</ion-note>
        }

        <ion-button type="submit" expand="block" [disabled]="!contactStore.canSave()">Save contact</ion-button>
      </form>
    </main>
  </ion-content>

  <ion-toast
    [isOpen]="!!contactStore.savedMessage()"
    [message]="contactStore.savedMessage()"
    [duration]="1500"
    position="bottom"
    (didDismiss)="contactStore.clearSavedMessage()"
  />
</div>
